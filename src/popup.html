<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Search</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Image Search</p>
          <h1>以图搜索</h1>
        </div>
        <button id="settingsButton" class="icon-button" type="button" aria-label="打开设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
            <path d="M19 13.4v-2.8l-2-.5a6 6 0 0 0-.7-1.6l1.1-1.8-2-2-1.8 1.1A6 6 0 0 0 12 5.1l-.6-2.1H8.6L8 5.1a6 6 0 0 0-1.6.7L4.6 4.7l-2 2 1.1 1.8A6 6 0 0 0 3 10.1l-2 .5v2.8l2 .5a6 6 0 0 0 .7 1.6l-1.1 1.8 2 2 1.8-1.1a6 6 0 0 0 1.6.7l.6 2.1h2.8l.6-2.1a6 6 0 0 0 1.6-.7l1.8 1.1 2-2-1.1-1.8a6 6 0 0 0 .7-1.6l2-.5Z"></path>
          </svg>
        </button>
      </header>

      <section class="actions" aria-label="图片来源">
        <button id="uploadButton" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 15V4"></path>
              <path d="m7 9 5-5 5 5"></path>
              <path d="M5 15v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"></path>
            </svg>
          </span>
          上传图片
        </button>
        <button id="pasteButton" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M9 4h6"></path>
              <path d="M9 4a3 3 0 0 0-3 3"></path>
              <path d="M15 4a3 3 0 0 1 3 3"></path>
              <path d="M7 7h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"></path>
              <path d="M9 12h6"></path>
              <path d="M9 16h4"></path>
            </svg>
          </span>
          粘贴图片
        </button>
        <button id="screenshotButton" type="button" class="primary-action">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7 4H5a1 1 0 0 0-1 1v2"></path>
              <path d="M17 4h2a1 1 0 0 1 1 1v2"></path>
              <path d="M20 17v2a1 1 0 0 1-1 1h-2"></path>
              <path d="M7 20H5a1 1 0 0 1-1-1v-2"></path>
              <rect x="8" y="8" width="8" height="8" rx="1.5"></rect>
            </svg>
          </span>
          页面截图
        </button>
      </section>

      <section class="engine-panel" aria-labelledby="engineTitle">
        <div class="section-head">
          <h2 id="engineTitle">搜索引擎</h2>
          <button id="selectAllButton" class="text-button" type="button">全选</button>
        </div>
        <div id="engineList" class="engine-list"></div>
      </section>

      <p id="status" role="status" aria-live="polite"></p>
      <input id="fileInput" type="file" accept="image/*" hidden>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
