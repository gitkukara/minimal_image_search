<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Search</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Image Search</p>
          <h1>以图搜索</h1>
        </div>
        <select id="engineSelect" aria-label="选择搜索引擎">
          <option value="google">Google</option>
        </select>
      </header>

      <section class="dropzone" id="dropzone" tabindex="0">
        <select id="defaultActionSelect" class="default-action-select" aria-label="选择大框默认功能">
          <option value="upload">上传图片</option>
          <option value="paste">粘贴图片</option>
          <option value="screenshot">页面截图</option>
        </select>
        <div class="lens-mark" aria-hidden="true"></div>
        <p id="previewText">上传、粘贴或截取当前页面</p>
        <img id="previewImage" alt="">
      </section>

      <section class="actions" aria-label="图片来源">
        <button id="uploadButton" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 15V4"></path>
              <path d="m7 9 5-5 5 5"></path>
              <path d="M5 15v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"></path>
            </svg>
          </span>
          上传图片
        </button>
        <button id="pasteButton" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M9 4h6"></path>
              <path d="M9 4a3 3 0 0 0-3 3"></path>
              <path d="M15 4a3 3 0 0 1 3 3"></path>
              <path d="M7 7h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"></path>
              <path d="M9 12h6"></path>
              <path d="M9 16h4"></path>
            </svg>
          </span>
          粘贴图片
        </button>
        <button id="screenshotButton" type="button">
          <span class="action-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M7 4H5a1 1 0 0 0-1 1v2"></path>
              <path d="M17 4h2a1 1 0 0 1 1 1v2"></path>
              <path d="M20 17v2a1 1 0 0 1-1 1h-2"></path>
              <path d="M7 20H5a1 1 0 0 1-1-1v-2"></path>
              <rect x="8" y="8" width="8" height="8" rx="1.5"></rect>
            </svg>
          </span>
          页面截图
        </button>
      </section>

      <footer class="footer">
        <button id="searchButton" type="button" disabled>
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6"></circle>
            <path d="m16 16 4 4"></path>
          </svg>
          开始搜索
        </button>
        <p id="status" role="status" aria-live="polite"></p>
      </footer>

      <input id="fileInput" type="file" accept="image/*" hidden>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
