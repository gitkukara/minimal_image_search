<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minimal Image Search 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="panel">
      <header>
        <p class="eyebrow">Settings</p>
        <h1>主界面搜索引擎</h1>
      </header>

      <section id="engineList" class="engine-list" aria-label="选择主界面显示的搜索引擎"></section>

      <footer>
        <button id="selectAllButton" type="button">全选</button>
        <button id="saveButton" type="button">保存</button>
      </footer>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="options.js" type="module"></script>
  </body>
</html>
