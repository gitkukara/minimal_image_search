<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>正在搜索</title>
    <link rel="stylesheet" href="search.css">
  </head>
  <body>
    <main>
      <img class="mark" src="icons/icon-128.png" alt="" aria-hidden="true">
      <h1>正在交给 Google</h1>
      <p id="status">准备图片...</p>

      <form
        id="searchForm"
        action="https://www.google.com/searchbyimage/upload?hl=zh-CN"
        method="post"
        enctype="multipart/form-data"
      >
        <input id="imageInput" type="file" name="encoded_image" accept="image/*">
        <input type="hidden" name="image_content" value="">
        <input id="filenameInput" type="hidden" name="filename" value="image.png">
      </form>
    </main>

    <script src="search.js" type="module"></script>
  </body>
</html>
